<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1B2A4A"/>
      <stop offset="100%" stop-color="#0F1623"/>
    </linearGradient>
    <linearGradient id="accent1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F09A64"/>
      <stop offset="100%" stop-color="#E87C3E"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg1)"/>

  <!-- Subtle grid lines (blueprint feel) -->
  <g stroke="#223357" stroke-width="0.5" opacity="0.4">
    <line x1="128" y1="80" x2="128" y2="432"/>
    <line x1="256" y1="80" x2="256" y2="432"/>
    <line x1="384" y1="80" x2="384" y2="432"/>
    <line x1="80" y1="176" x2="432" y2="176"/>
    <line x1="80" y1="296" x2="432" y2="296"/>
  </g>

  <!-- House/Building icon formed from geometric shapes -->
  <!-- Roof -->
  <polygon points="256,110 370,210 142,210" fill="url(#accent1)"/>
  <!-- Chimney -->
  <rect x="320" y="130" width="24" height="60" rx="2" fill="#E87C3E"/>

  <!-- Building body -->
  <rect x="162" y="210" width="196" height="150" rx="4" fill="#F5F1EB"/>

  <!-- Windows -->
  <rect x="185" y="232" width="50" height="40" rx="3" fill="#1B2A4A"/>
  <rect x="285" y="232" width="50" height="40" rx="3" fill="#1B2A4A"/>
  <!-- Window cross bars -->
  <line x1="210" y1="232" x2="210" y2="272" stroke="#223357" stroke-width="2"/>
  <line x1="185" y1="252" x2="235" y2="252" stroke="#223357" stroke-width="2"/>
  <line x1="310" y1="232" x2="310" y2="272" stroke="#223357" stroke-width="2"/>
  <line x1="285" y1="252" x2="335" y2="252" stroke="#223357" stroke-width="2"/>

  <!-- Door -->
  <rect x="234" y="300" width="52" height="60" rx="3" fill="#E87C3E"/>
  <circle cx="276" cy="333" r="4" fill="#1B2A4A"/>

  <!-- "BZ" text -->
  <text x="256" y="440" text-anchor="middle" font-family="Arial Black, Impact, sans-serif" font-size="56" font-weight="900" fill="#E87C3E" letter-spacing="6">BZ</text>

  <!-- Thin accent ring -->
  <circle cx="256" cy="256" r="248" fill="none" stroke="#E87C3E" stroke-width="2" opacity="0.3"/>
</svg>
