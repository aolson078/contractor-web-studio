<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1B2A4A"/>
      <stop offset="100%" stop-color="#0F1623"/>
    </linearGradient>
    <linearGradient id="accentGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F09A64"/>
      <stop offset="50%" stop-color="#E87C3E"/>
      <stop offset="100%" stop-color="#D06A2E"/>
    </linearGradient>
    <clipPath id="circleClip">
      <circle cx="256" cy="256" r="256"/>
    </clipPath>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg3)"/>

  <!-- Abstract architectural frame / zen-inspired -->
  <!-- Outer zen circle (enso-inspired) -->
  <circle cx="256" cy="240" r="160" fill="none" stroke="#E87C3E" stroke-width="6" stroke-dasharray="920 80" stroke-linecap="round" opacity="0.8"/>

  <!-- Minimalist building silhouette inside the circle -->
  <!-- Tall center tower -->
  <rect x="232" y="130" width="48" height="180" rx="2" fill="#F5F1EB"/>
  <!-- Left wing -->
  <rect x="172" y="190" width="60" height="120" rx="2" fill="#F5F1EB" opacity="0.85"/>
  <!-- Right wing -->
  <rect x="280" y="170" width="60" height="140" rx="2" fill="#F5F1EB" opacity="0.85"/>

  <!-- Window details on tower -->
  <rect x="244" y="148" width="24" height="18" rx="2" fill="#1B2A4A"/>
  <rect x="244" y="178" width="24" height="18" rx="2" fill="#1B2A4A"/>
  <rect x="244" y="208" width="24" height="18" rx="2" fill="#1B2A4A"/>

  <!-- Window details on wings -->
  <rect x="186" y="208" width="18" height="14" rx="1" fill="#1B2A4A"/>
  <rect x="214" y="208" width="18" height="14" rx="1" fill="#1B2A4A"/>
  <rect x="186" y="238" width="18" height="14" rx="1" fill="#1B2A4A"/>
  <rect x="214" y="238" width="18" height="14" rx="1" fill="#1B2A4A"/>

  <rect x="294" y="192" width="18" height="14" rx="1" fill="#1B2A4A"/>
  <rect x="322" y="192" width="18" height="14" rx="1" fill="#1B2A4A"/>
  <rect x="294" y="222" width="18" height="14" rx="1" fill="#1B2A4A"/>
  <rect x="322" y="222" width="18" height="14" rx="1" fill="#1B2A4A"/>

  <!-- Ground line -->
  <line x1="140" y1="310" x2="372" y2="310" stroke="#E87C3E" stroke-width="3" stroke-linecap="round"/>

  <!-- "BUILDZEN" text -->
  <text x="256" y="380" text-anchor="middle" font-family="Arial Black, Impact, sans-serif" font-size="40" font-weight="900" fill="#F5F1EB" letter-spacing="4">BUILDZEN</text>

  <!-- "STUDIO" subtitle -->
  <text x="256" y="412" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="300" fill="#E87C3E" letter-spacing="10">STUDIO</text>

  <!-- Subtle outer ring -->
  <circle cx="256" cy="256" r="250" fill="none" stroke="#F5F1EB" stroke-width="1" opacity="0.1"/>
</svg>
