<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BuildZen Studio - Profile Designs</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0F1623;
      color: #E8E4DE;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 24px 16px;
    }
    h1 {
      text-align: center;
      font-size: 22px;
      margin-bottom: 8px;
      color: #E87C3E;
    }
    p {
      text-align: center;
      color: #A0A8B8;
      font-size: 14px;
      margin-bottom: 32px;
    }
    .designs {
      display: flex;
      flex-direction: column;
      gap: 32px;
      max-width: 400px;
      margin: 0 auto;
    }
    .card {
      background: #1B2A4A;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
    }
    .card img {
      width: 100%;
      max-width: 280px;
      height: auto;
      border-radius: 8px;
    }
    .card h2 {
      margin-top: 14px;
      font-size: 18px;
      color: #F5F1EB;
    }
    .card span {
      display: block;
      margin-top: 6px;
      font-size: 13px;
      color: #A0A8B8;
    }
  </style>
</head>
<body>
  <h1>BuildZen Studio</h1>
  <p>Profile Picture Designs</p>
  <div class="designs">
    <div class="card">
      <img src="profile-design-1.svg" alt="Design 1">
      <h2>Design 1</h2>
      <span>House Icon + "BZ" Monogram</span>
    </div>
    <div class="card">
      <img src="profile-design-2.svg" alt="Design 2">
      <h2>Design 2</h2>
      <span>Block Letter "B"</span>
    </div>
    <div class="card">
      <img src="profile-design-3.svg" alt="Design 3">
      <h2>Design 3</h2>
      <span>Zen Circle + Skyline</span>
    </div>
  </div>
</body>
</html>
